# Example configuration file for extauthz

# Based on github.com/openkcm/common-sdk/pkg/commoncfg
application:
  name: extauthz
  environment: development

featureGates:
  enrich-header-with-client-type: false
  enrich-header-with-client-region: false

logger:
  level: debug # one of: debug, info, warn, error
  format: text # one of: json, text

status: # status server configuration
  enabled: true
  address: :8080
  profiling: true

# Based on github.com/openkcm/extauthz/pkg/config
grpcServer: # ext_authz gRPC server configuration
  address: :9092
  flags:
    health: true
    reflection: true

# Path to Cedar policy files
cedar:
  policyPath: ./

# Client Certificate handling
mtls:
  trustedSubjectsYaml: ./trustedSubjects.yaml

# JWT Token handling
jwt:
  issuerClaimKeys:
    - iss
  providers:
    - issuer: https://my.oidc.jwt.provider.com/
      audiences:
        - my-audience

sessionPathPrefixes: ["/cmk/v1/"]
sessionManager:
  enabled: true
  address: localhost:5555
  secretRef:
    type: insecure

clientData:
  # Signing client data
  signingKeyIDFilePath: ./keyId

# Telemetry / OpenTelemetry (commented out by default).
#
# Enabling any of telemetry.traces, telemetry.logs, or non-Prometheus
# telemetry.metrics causes common-sdk to install a global W3C
# TextMapPropagator and (for traces.enabled=true) a real TracerProvider.
# ExtAuthz extracts W3C trace context from inbound HTTP headers and emits
# an `ext_authz.check` span per Check call when this is on. Aligned to
# github.com/openkcm/common-sdk/pkg/commoncfg.Telemetry.
#
# telemetry:
#   traces:
#     enabled: true
#     protocol: grpc            # one of: grpc, http
#     host:                     # SourceRef; embedded or fileRef
#       embedded: otel-collector:4317
#     secretRef:
#       type: insecure          # use mtls / apiToken / oauth2 / basic in prod
#   logs:
#     enabled: false
#   metrics:
#     enabled: false
